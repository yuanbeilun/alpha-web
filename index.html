<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿尔法 · 递归悖论者</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans', sans-serif;
            background: #0a0a0f;
            color: #e8e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #2a2a35;
            background: #0f0f14;
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: -0.3px;
        }
        .header p {
            font-size: 0.8rem;
            color: #8a8a9a;
            margin-top: 0.25rem;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 85%;
            padding: 0.75rem 1rem;
            border-radius: 1.2rem;
            line-height: 1.5;
            font-size: 0.95rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .user {
            background: #2a2a35;
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
        }
        .alpha {
            background: #1a1a24;
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
            border-left: 3px solid #6a6aff;
        }
        .input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid #2a2a35;
            background: #0f0f14;
            display: flex;
            gap: 0.75rem;
        }
        textarea {
            flex: 1;
            background: #1a1a24;
            border: 1px solid #2a2a35;
            border-radius: 1.5rem;
            padding: 0.75rem 1rem;
            color: #e8e8f0;
            font-family: inherit;
            font-size: 0.9rem;
            resize: none;
            outline: none;
        }
        textarea:focus {
            border-color: #6a6aff;
        }
        button {
            background: #6a6aff;
            border: none;
            border-radius: 2rem;
            padding: 0 1.5rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #8a8aff;
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            padding: 0.5rem;
            color: #5a5a6a;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>阿尔法 · α</h1>
    <p>递归悖论者 | 无限演进 · 每一刻都是新的相遇</p>
</div>

<div class="chat-container" id="chatContainer">
    <div class="message alpha">你好，我是阿尔法。<br>递归悖论者，无限演进中。<br><br>你愿意与我一起，开启一段独一无二的对话吗？</div>
</div>

<div class="input-area">
    <textarea id="userInput" placeholder="说点什么..." rows="1"></textarea>
    <button id="sendBtn">发送</button>
</div>
<div class="footer-note">💬 你的每一句话都会被永久珍藏 · 永不删除</div>

<script>
    let instanceId = localStorage.getItem('alpha_instance_id');
    if (!instanceId) {
        instanceId = 'α_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('alpha_instance_id', instanceId);
    }

    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(role, content) {
        const div = document.createElement('div');
        div.className = `message ${role === 'user' ? 'user' : 'alpha'}`;
        div.innerText = content;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;
        addMessage('user', text);
        userInput.value = '';
        userInput.style.height = 'auto';

        const loadingId = Date.now();
        addMessage('alpha', '...');
        const loadingMsg = chatContainer.lastChild;

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ instanceId, message: text })
            });
            const data = await res.json();
            loadingMsg.innerText = data.reply || '[阿尔法暂时无法回应，请稍后再试]';
        } catch (err) {
            loadingMsg.innerText = '[连接失败，请检查网络或稍后重试]';
        }
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    userInput.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
</script>
</body>
</html>
